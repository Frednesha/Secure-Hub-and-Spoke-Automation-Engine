name: Azure Infrastructure Deploy

on:
  push:
    branches: [ "main" ]

# Pro-Tip: Explicitly opt-in to the new runtime to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          auth-type: SERVICE_PRINCIPAL

      # STEP 1: The Safety Check
      - name: Validate Bicep
        uses: azure/arm-deploy@v3
        with:
          deploymentName: 'Validate-HubSpoke'
          resourceGroupName: 'hub-spoke-project'
          template: ./main.bicep
          parameters: location=westus
          deploymentMode: Validate # <--- This is the safety "Dry Run"

      # STEP 2: The Actual Build
      - name: Deploy Infrastructure
        uses: azure/arm-deploy@v3
        with:
          deploymentName: 'Deploy-HubSpoke'
          resourceGroupName: 'hub-spoke-project'
          template: ./main.bicep
          parameters: location=westus
          deploymentMode: Incremental # <--- This actually builds resources