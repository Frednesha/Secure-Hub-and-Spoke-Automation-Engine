name: Azure Infrastructure Deploy

on:
  push:
    branches: [ "main" ]

# Pro-Tip: Explicitly opt-in to the new runtime to remove the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Use v6 (or the latest 2026 release) for Node 24 support
      - name: Checkout Code
        uses: actions/checkout@v6 

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # This tells the action: "Don't look for OIDC tokens, use my JSON secret."
          auth-type: SERVICE_PRINCIPAL

      - name: Validate Bicep
        uses: azure/arm-deploy@v2 # Upgrading to v2
        with:
          deploymentName: 'Validate-HubSpoke'
          resourceGroupName: 'RG-Project-Prod'
          template: ./main.bicep
          deploymentMode: Validate
          parameters: ./azuredeploy.parameters.json # Using the inline parameter we discussed